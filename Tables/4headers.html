<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Headers in table</title>
    <style>
        table, th, td{
            border: 2px solid black;
            border-collapse: collapse;
        }
        th{
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>vertical headers in table</h1>
    <table style="width: 100%;">
        <caption>Employee data</caption>
        <tr>
            <th colspan="2">Name</th>
            <!-- <th>Lastname</th> commented for colspan execute correctly -->
            <th>Age</th>
        </tr>
        <tr>
            <td>Jill</td>
            <td>Eve</td>
            <td rowspan="2">94</td>
        </tr>
        <tr>
            <td>Smith</td>
            <td>Jackson</td>
            <!-- <td>50</td> commented for rowsapn execution correctely-->
        </tr>

</table>
    
</body>
</html>
